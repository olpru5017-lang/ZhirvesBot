services:
  - type: web
    name: discord-music-bot
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: COMMAND_PREFIX
        value: /
      - key: MAX_QUEUE_SIZE
        value: 100
      - key: DISCONNECT_TIMEOUT
        value: 300
      - key: PAUSE_TIMEOUT
        value: 600
      - key: MAX_PLAYLIST_SIZE
        value: 50
      - key: SEARCH_TIMEOUT
        value: 10
      - key: EXTRACT_TIMEOUT
        value: 3
